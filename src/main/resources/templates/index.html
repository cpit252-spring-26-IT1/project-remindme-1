<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RemindMe | Smart Reminder System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
        }
        body {
            background: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }
        .navbar-custom { background: var(--primary-gradient); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card {
            border: none;
            border-radius: 15px;
            background: var(--glass-bg);
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-5px); }
        .card-upload {
            border: 2px dashed #764ba2;
            background: rgba(118, 75, 162, 0.05);
            transition: all 0.3s ease;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
        }
        .card-upload:hover { background: rgba(118, 75, 162, 0.1); border-color: #667eea; }
        .file-input-wrapper input[type="file"] {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; cursor: pointer;
        }
        .status-badge { font-size: 0.85rem; padding: 0.4em 0.8em; border-radius: 8px; }
        .btn-custom { background: var(--primary-gradient); color: white; border: none; border-radius: 8px; font-weight: 600; }
        .btn-custom:hover { opacity: 0.9; color: white; transform: scale(1.02); }
        #fileNameDisplay { font-size: 0.85rem; color: #764ba2; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom mb-5 py-3">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#"><i class="bi bi-robot me-2"></i> RemindMe Dashboard</a>
    </div>
</nav>

<div class="container pb-5">
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card h-100 p-2">
                <div class="card-body">
                    <h5 class="card-title fw-bold mb-4 text-secondary"><i class="bi bi-plus-circle me-2"></i>New Reminder</h5>

                    <form id="reminderForm">
                        <div class="card-upload p-4 text-center mb-4 file-input-wrapper">
                            <i class="bi bi-cloud-arrow-up-fill display-4" style="color: #667eea;"></i>
                            <p class="mt-3 mb-1 fw-bold text-dark">Drag image or click to upload</p>
                            <p class="text-muted small mb-0">Supports JPG, PNG</p>
                            <input type="file" id="imageUpload" accept="image/*" required>
                        </div>

                        <div id="fileNameDisplay" class="text-center mb-3"></div>

                        <div class="mb-4">
                            <label class="form-label text-muted small fw-bold">Reminder Name (Extracted if left blank)</label>
                            <input type="text" class="form-control form-control-lg bg-light" id="reminderName" placeholder="e.g.: Car Insurance">
                        </div>

                        <button type="submit" class="btn btn-custom w-100 py-2 shadow-sm" id="submitBtn">
                            <i class="bi bi-magic me-2"></i> Analyze Image (OCR) & Save
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card h-100 p-2">
                <div class="card-header bg-transparent border-0 d-flex justify-content-between align-items-center pt-3 pb-0">
                    <h5 class="mb-0 fw-bold text-secondary"><i class="bi bi-list-check me-2"></i>Active Reminders</h5>
                    <span class="badge bg-primary rounded-pill px-3 py-2 shadow-sm" id="countBadge">0 Reminders</span>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mt-3">
                            <thead class="table-light">
                            <tr>
                                <th class="text-muted">Item / File</th>
                                <th class="text-muted">Expiry Date</th>
                                <th class="text-muted">Status</th>
                                <th class="text-muted">Action</th>
                            </tr>
                            </thead>
                            <tbody id="remindersTableBody">
                            </tbody>
                        </table>

                        <div id="emptyState" class="text-center text-muted py-5" style="display: none;">
                            <i class="bi bi-inbox display-1 opacity-25"></i>
                            <p class="mt-3">No reminders currently. Upload an image to start!</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. Basic Variables
    const fileInput = document.getElementById('imageUpload');
    const fileNameDisplay = document.getElementById('fileNameDisplay');
    const form = document.getElementById('reminderForm');
    const tableBody = document.getElementById('remindersTableBody');
    const emptyState = document.getElementById('emptyState');
    const countBadge = document.getElementById('countBadge');

    // 2. Read saved data from browser (for realistic experience)
    let reminders = JSON.parse(localStorage.getItem('reminders')) || [];

    // 3. Display file name when selected
    fileInput.addEventListener('change', function(e) {
        if(e.target.files.length > 0) {
            const fileName = e.target.files[0].name;
            const fileSize = (e.target.files[0].size / 1024).toFixed(2); // in KB
            fileNameDisplay.innerHTML = `<i class="bi bi-file-earmark-image"></i> Attached: ${fileName} (${fileSize} KB)`;
        } else {
            fileNameDisplay.innerHTML = '';
        }
    });

    // 4. Update Table
    function updateTable() {
        tableBody.innerHTML = '';
        countBadge.innerText = `${reminders.length} Reminders`;

        if (reminders.length === 0) {
            emptyState.style.display = 'block';
        } else {
            emptyState.style.display = 'none';

            reminders.forEach((reminder, index) => {
                // Randomly assign status color for simulation (in reality it depends on remaining days)
                const statuses = [
                    { class: 'bg-danger', text: 'Urgent (< 48h)' },
                    { class: 'bg-warning text-dark', text: 'Upcoming (< 14 days)' },
                    { class: 'bg-success', text: 'Scheduled (> 30 days)' }
                ];
                // Select status based on stored number, or random for new ones
                const statusIndex = reminder.statusIndex !== undefined ? reminder.statusIndex : Math.floor(Math.random() * 3);
                reminder.statusIndex = statusIndex; // Save status

                const row = `
                    <tr>
                        <td>
                            <div class="fw-bold text-dark">${reminder.name}</div>
                            <small class="text-muted"><i class="bi bi-paperclip"></i> ${reminder.fileName}</small>
                        </td>
                        <td><span class="fw-medium">${reminder.date}</span></td>
                        <td><span class="badge ${statuses[statusIndex].class} status-badge">${statuses[statusIndex].text}</span></td>
                        <td>
                            <button onclick="deleteReminder(${index})" class="btn btn-sm btn-outline-danger rounded-circle shadow-sm" title="Delete">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
                tableBody.insertAdjacentHTML('beforeend', row);
            });
            // Update local storage
            localStorage.setItem('reminders', JSON.stringify(reminders));
        }
    }

    // 5. Add new reminder (Simulate sending image to backend and receiving data)
    form.addEventListener('submit', function(e) {
        e.preventDefault();

        const file = fileInput.files[0];
        let nameVal = document.getElementById('reminderName').value;
        const btn = document.getElementById('submitBtn');

        // Loading effect
        btn.innerHTML = `<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Analyzing...`;
        btn.disabled = true;

        // Simulate server delay (OCR Process) for 1.5 seconds
        setTimeout(() => {
            // Generate random date for simulation
            const mockDate = new Date();
            mockDate.setDate(mockDate.getDate() + Math.floor(Math.random() * 60)); // Date within 60 days
            const formattedDate = mockDate.toISOString().split('T')[0]; // Format YYYY-MM-DD

            // If user didn't write a name, use file name without extension
            if (!nameVal) {
                nameVal = file.name.split('.').slice(0, -1).join('.');
            }

            // Create data object
            const newReminder = {
                name: nameVal,
                fileName: file.name,
                date: formattedDate
            };

            // Add to table and update
            reminders.unshift(newReminder); // Add to the beginning of the list
            updateTable();

            // Reset form
            form.reset();
            fileNameDisplay.innerHTML = '';
            btn.innerHTML = `<i class="bi bi-magic me-2"></i> Analyze Image (OCR) & Save`;
            btn.disabled = false;

        }, 1500);
    });

    // 6. Delete Reminder
    window.deleteReminder = function(index) {
        if(confirm('Are you sure you want to delete this reminder?')) {
            reminders.splice(index, 1);
            updateTable();
        }
    };

    // Run update when page loads
    updateTable();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
