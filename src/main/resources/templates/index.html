<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RemindMe | Smart Reminder System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
        }
        body {
            background: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }
        .navbar-custom { background: var(--primary-gradient); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card {
            border: none;
            border-radius: 15px;
            background: var(--glass-bg);
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-5px); }
        .card-upload {
            border: 2px dashed #764ba2;
            background: rgba(118, 75, 162, 0.05);
            transition: all 0.3s ease;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
        }
        .card-upload:hover { background: rgba(118, 75, 162, 0.1); border-color: #667eea; }
        .file-input-wrapper input[type="file"] {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; cursor: pointer;
        }
        .status-badge { font-size: 0.85rem; padding: 0.4em 0.8em; border-radius: 8px; }
        .btn-custom { background: var(--primary-gradient); color: white; border: none; border-radius: 8px; font-weight: 600; }
        .btn-custom:hover { opacity: 0.9; color: white; transform: scale(1.02); }
        #fileNameDisplay { font-size: 0.85rem; color: #764ba2; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom mb-5 py-3">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#"><i class="bi bi-robot me-2"></i> RemindMe Dashboard</a>
    </div>
</nav>

<div class="container pb-5">
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card h-100 p-2">
                <div class="card-body">
                    <h5 class="card-title fw-bold mb-4 text-secondary"><i class="bi bi-plus-circle me-2"></i>New Reminder</h5>

                    <form id="reminderForm">
                        <div class="card-upload p-4 text-center mb-4 file-input-wrapper">
                            <i class="bi bi-cloud-arrow-up-fill display-4" style="color: #667eea;"></i>
                            <p class="mt-3 mb-1 fw-bold text-dark">Drag image or click to upload</p>
                            <p class="text-muted small mb-0">Supports JPG, PNG</p>
                            <input type="file" id="imageUpload" accept="image/*">
                        </div>

                        <div id="fileNameDisplay" class="text-center mb-3"></div>

                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Reminder Name</label>
                            <input type="text" class="form-control bg-light" id="reminderName" placeholder="e.g.: Car Insurance" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Document Type</label>
                            <select class="form-select bg-light" id="documentType">
                                <option value="Passport">Passport</option>
                                <option value="National ID">National ID</option>
                                <option value="Driving License">Driving License</option>
                                <option value="Bank Card">Bank Card</option>
                                <option value="University Card">University Card</option>
                                <option value="General">General</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Expiry Date</label>
                            <input type="date" class="form-control bg-light" id="expiryDate" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Your Email</label>
                            <input type="email" class="form-control bg-light" id="userEmail" placeholder="you@email.com" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Owner Name</label>
                            <input type="text" class="form-control bg-light" id="ownerName" placeholder="e.g.: Dad or Ahmed" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-muted small fw-bold">Category</label>
                            <select class="form-select bg-light" id="category">
                                <option value="Personal">Personal</option>
                                <option value="Children">Children</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-custom w-100 py-2 shadow-sm" id="submitBtn">
                            <i class="bi bi-magic me-2"></i> Save Reminder
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card h-100 p-2">
                <div class="card-header bg-transparent border-0 d-flex justify-content-between align-items-center pt-3 pb-0">
                    <h5 class="mb-0 fw-bold text-secondary"><i class="bi bi-list-check me-2"></i>Active Reminders</h5>
                    <span class="badge bg-primary rounded-pill px-3 py-2 shadow-sm" id="countBadge">0 Reminders</span>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mt-3">
                            <thead class="table-light">
                            <tr>
                                <th class="text-muted">Document</th>
                                <th class="text-muted">Owner</th>
                                <th class="text-muted">Expiry Date</th>
                                <th class="text-muted">Status</th>
                            </tr>
                            </thead>
                            <tbody id="remindersTableBody">
                            </tbody>
                        </table>

                        <div id="emptyState" class="text-center text-muted py-5">
                            <i class="bi bi-inbox display-1 opacity-25"></i>
                            <p class="mt-3">No reminders yet. Add one to get started!</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('imageUpload');
    const fileNameDisplay = document.getElementById('fileNameDisplay');
    const form = document.getElementById('reminderForm');
    const tableBody = document.getElementById('remindersTableBody');
    const emptyState = document.getElementById('emptyState');
    const countBadge = document.getElementById('countBadge');

    // Show file name when selected
    fileInput.addEventListener('change', function(e) {
        if (e.target.files.length > 0) {
            const fileName = e.target.files[0].name;
            const fileSize = (e.target.files[0].size / 1024).toFixed(2);
            fileNameDisplay.innerHTML = `<i class="bi bi-file-earmark-image"></i> Attached: ${fileName} (${fileSize} KB)`;
        } else {
            fileNameDisplay.innerHTML = '';
        }
    });

    // Update table with data from backend
    function updateTable(documents) {
        tableBody.innerHTML = '';
        countBadge.innerText = `${documents.length} Reminders`;

        if (documents.length === 0) {
            emptyState.style.display = 'block';
        } else {
            emptyState.style.display = 'none';

            documents.forEach((doc) => {
                const expiry = new Date(doc.expiryDate);
                const today = new Date();
                const daysLeft = Math.ceil((expiry - today) / (1000 * 60 * 60 * 24));

                let statusClass, statusText;
                if (daysLeft < 2) {
                    statusClass = 'bg-danger';
                    statusText = 'Urgent (< 48h)';
                } else if (daysLeft <= 14) {
                    statusClass = 'bg-warning text-dark';
                    statusText = `Upcoming (${daysLeft} days)`;
                } else {
                    statusClass = 'bg-success';
                    statusText = `${daysLeft} days left`;
                }

                const row = `
                    <tr>
                        <td>
                            <div class="fw-bold text-dark">${doc.documentName}</div>
                            <small class="text-muted">${doc.documentType} · ${doc.category}</small>
                        </td>
                        <td>${doc.ownerName}</td>
                        <td><span class="fw-medium">${doc.expiryDate}</span></td>
                        <td><span class="badge ${statusClass} status-badge">${statusText}</span></td>
                    </tr>
                `;
                tableBody.insertAdjacentHTML('beforeend', row);
            });
        }
    }

    // Load all reminders from backend
    function loadReminders() {
        fetch('/api/documents')
            .then(res => res.json())
            .then(data => updateTable(data))
            .catch(err => console.error('Error loading reminders:', err));
    }

    // Submit form to backend
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerHTML = `<span class="spinner-border spinner-border-sm" role="status"></span> Saving...`;
        btn.disabled = true;

        const body = {
            documentName: document.getElementById('reminderName').value,
            documentType: document.getElementById('documentType').value,
            expiryDate: document.getElementById('expiryDate').value,
            userEmail: document.getElementById('userEmail').value,
            ownerName: document.getElementById('ownerName').value,
            category: document.getElementById('category').value
        };

        fetch('/api/documents', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        })
        .then(res => res.json())
        .then(() => {
            loadReminders();
            form.reset();
            fileNameDisplay.innerHTML = '';
            btn.innerHTML = `<i class="bi bi-magic me-2"></i> Save Reminder`;
            btn.disabled = false;
        })
        .catch(err => {
            console.error('Error saving:', err);
            btn.innerHTML = `<i class="bi bi-magic me-2"></i> Save Reminder`;
            btn.disabled = false;
        });
    });

    // Load on page start
    loadReminders();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
