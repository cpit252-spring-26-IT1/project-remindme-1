spring.application.name=RemindMe


# changed it from creating a file, to keeping the information in memory for easier development. which is: spring.datasource.url=jdbc:h2:mem:testdb
# old,where it creates a file is: spring.datasource.url=jdbc:h2:file:./data/remindmedb


# H2 Database
spring.datasource.url=jdbc:h2:mem:remindmedb

spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=create-drop





# This silences the 'noise'
logging.level.root=WARN